<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>울산동구가족센터 가족축제</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1e;
      --card: #111827;
      --accent: #f97316;
      --accent2: #fbbf24;
      --text: #f1f5f9;
      --muted: #64748b;
      --success: #22c55e;
      --warn: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* 배경 파티클 */
    .bg-circles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.06;
      animation: float 8s ease-in-out infinite;
    }
    .circle:nth-child(1) { width: 300px; height: 300px; background: var(--accent); top: -80px; left: -80px; animation-delay: 0s; }
    .circle:nth-child(2) { width: 200px; height: 200px; background: var(--accent2); bottom: 10%; right: -50px; animation-delay: 3s; }
    .circle:nth-child(3) { width: 150px; height: 150px; background: var(--success); top: 50%; left: -30px; animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    /* 상태별 화면 */
    .screen { display: none; flex-direction: column; align-items: center; gap: 24px; }
    .screen.active { display: flex; }

    /* 로딩 화면 */
    .spinner {
      width: 52px; height: 52px;
      border: 3px solid rgba(249,115,22,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 성공 화면 */
    .badge {
      background: linear-gradient(135deg, #1a2540, #0f172a);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      box-shadow: 0 0 60px rgba(249,115,22,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .badge-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .festival-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 22px;
      color: var(--text);
      margin-bottom: 28px;
      line-height: 1.3;
    }

    .number-wrap {
      position: relative;
      margin: 8px 0 28px;
    }

    .number-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .number {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 72px;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .number-suffix {
      font-size: 18px;
      color: var(--muted);
      font-weight: 700;
      margin-top: 4px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(to right, var(--accent), var(--accent2));
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .welcome-msg {
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
      font-weight: 400;
    }

    .welcome-msg strong {
      color: var(--accent2);
      font-weight: 700;
    }

    .timestamp {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .confetti-row {
      font-size: 28px;
      letter-spacing: 8px;
      animation: wave 1s ease-in-out;
    }
    @keyframes wave {
      0% { transform: translateY(10px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* 이미 입장 화면 */
    .already-badge {
      background: linear-gradient(135deg, #1a1a2e, #0f172a);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
    }

    .already-icon { font-size: 52px; margin-bottom: 8px; }

    .already-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 22px;
      color: var(--accent2);
      margin-bottom: 12px;
    }

    .already-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .already-number {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 42px;
      color: var(--accent2);
      margin: 16px 0 4px;
    }

    /* 오류 화면 */
    .error-icon { font-size: 48px; }
    .error-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 20px;
      color: var(--warn);
    }
    .error-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* 공통 서브텍스트 */
    .sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="bg-circles">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="container">

    <!-- 로딩 -->
    <div class="screen active" id="screen-loading">
      <div class="spinner"></div>
      <p class="sub">입장 처리 중...</p>
    </div>

    <!-- 성공: 신규 입장 -->
    <div class="screen" id="screen-success">
      <div class="confetti-row">🎉 🎊 🎈</div>
      <div class="badge">
        <div class="badge-label">입장 완료</div>
        <div class="festival-title">2025 울산동구<br>가족축제</div>
        <div class="divider"></div>
        <div class="number-wrap">
          <div class="number-label">참가 번호</div>
          <div class="number" id="participant-number">—</div>
          <div class="number-suffix">번째 참가자</div>
        </div>
        <div class="welcome-msg">
          축제에 오신 것을 <strong>환영합니다!</strong><br>
          즐거운 시간 보내세요 😊
        </div>
        <div class="timestamp" id="entry-time"></div>
      </div>
    </div>

    <!-- 이미 입장 처리됨 -->
    <div class="screen" id="screen-already">
      <div class="already-badge">
        <div class="already-icon">✅</div>
        <div class="already-title">이미 입장하셨어요</div>
        <div class="already-number" id="already-number">—</div>
        <div class="already-desc">
          이 기기는 이미 입장 처리되었습니다.<br>
          즐거운 시간 보내세요!
        </div>
      </div>
    </div>

    <!-- 오류 -->
    <div class="screen" id="screen-error">
      <div class="error-icon">⚠️</div>
      <div class="error-title">연결 오류</div>
      <div class="error-desc" id="error-msg">잠시 후 다시 시도하거나<br>스태프에게 문의해주세요.</div>
    </div>

  </div>

  <script>
    // ================================================
    // ★ 설정값 - Google Apps Script 배포 URL로 교체 ★
    // ================================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzY4e-p1y3lLRHWQL4_X0UHVsiYGT3ioRqI3LMl8TbH_GDUhQvIav7Up2FUJOSs9fK5lg/exec';
    // ================================================

    const STORAGE_KEY = 'festival_2025_uid';

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }

    function formatTime(isoStr) {
      const d = new Date(isoStr);
      return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} 입장`;
    }

    async function checkIn() {
      // 이미 입장한 기기인지 확인
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        document.getElementById('already-number').textContent = data.number + '번';
        showScreen('already');
        return;
      }

      // 기기 고유 ID 생성 (브라우저 핑거프린트 간이버전)
      const deviceId = generateDeviceId();

      try {
        const url = SCRIPT_URL + '?action=checkin&deviceId=' + encodeURIComponent(deviceId);
        const res = await fetch(url, { method: 'GET' });
        const data = await res.json();

        if (data.status === 'new') {
          // 로컬에 저장 (재방문 시 중복 방지)
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            number: data.number,
            time: data.time
          }));

          document.getElementById('participant-number').textContent = data.number;
          document.getElementById('entry-time').textContent = formatTime(data.time);
          showScreen('success');

        } else if (data.status === 'duplicate') {
          document.getElementById('already-number').textContent = data.number + '번';
          showScreen('already');

        } else {
          throw new Error(data.message || '알 수 없는 오류');
        }

      } catch (err) {
        document.getElementById('error-msg').textContent = err.message || '네트워크 오류가 발생했습니다.';
        showScreen('error');
      }
    }

    function generateDeviceId() {
      // 기존 ID가 있으면 재사용
      let id = sessionStorage.getItem('_dev_id');
      if (!id) {
        const nav = navigator;
        const raw = [
          nav.userAgent,
          nav.language,
          screen.width + 'x' + screen.height,
          new Date().getTimezoneOffset(),
          nav.hardwareConcurrency || '',
          nav.platform || ''
        ].join('|');
        // 간단한 해시
        let hash = 0;
        for (let i = 0; i < raw.length; i++) {
          hash = ((hash << 5) - hash) + raw.charCodeAt(i);
          hash |= 0;
        }
        id = Math.abs(hash).toString(36) + Date.now().toString(36);
        sessionStorage.setItem('_dev_id', id);
      }
      return id;
    }

    // 페이지 로드 시 바로 실행
    checkIn();
  </script>
</body>
</html>
